<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>小公主的数学乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 去除点击高亮 */
        }
        
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 100%;
            width: 100%;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
        }
        
        h1 {
            color: #ff6b6b;
            font-size: 1.8em;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            word-break: keep-all;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .subtitle {
            color: #4ecdc4;
            font-size: 0.9em;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .section {
            margin: 15px 0;
            padding: 15px 10px;
            border-radius: 12px;
            background: linear-gradient(to right, #a8edea, #fed6e3);
        }
        
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .number-btn {
            width: 100%;
            aspect-ratio: 1; /* 保持正方形比例 */
            max-width: 60px;
            max-height: 60px;
            margin: 0 auto;
            border: none;
            border-radius: 50%;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .number-btn:hover, .number-btn:active {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .symbols-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .symbol-btn {
            width: 100%;
            aspect-ratio: 1;
            max-width: 60px;
            max-height: 60px;
            margin: 0 auto;
            border: none;
            border-radius: 12px;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .symbol-btn:hover, .symbol-btn:active {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .display-area {
            background-color: white;
            border-radius: 12px;
            padding: 15px 10px;
            margin: 15px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #ff6b6b;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.1);
            line-height: 1.4;
            word-break: break-all;
        }
        
        .interactive-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }
        
        .counter-display {
            font-size: 2.5em;
            color: #ff6b6b;
            min-width: 80px;
            text-align: center;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .add-btn { background-color: #4ecdc4; color: white; }
        .subtract-btn { background-color: #ff6b6b; color: white; }
        .multiply-btn { background-color: #ffd166; color: white; }
        .divide-btn { background-color: #6a0572; color: white; }
        
        .emoji-display {
            font-size: 3em;
            margin: 10px 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .color-1 { background: linear-gradient(45deg, #ff9a9e, #fecfef); }
        .color-2 { background: linear-gradient(45deg, #fbc2eb, #a6c1ee); }
        .color-3 { background: linear-gradient(45deg, #84fab0, #8fd3f4); }
        .color-4 { background: linear-gradient(45deg, #d4fc79, #96e6a1); }
        .color-5 { background: linear-gradient(45deg, #a1c4fd, #c2e9fb); }
        .color-6 { background: linear-gradient(45deg, #ffecd2, #fcb69f); }
        .color-7 { background: linear-gradient(45deg, #ff8a80, #ffccbc); }
        .color-8 { background: linear-gradient(45deg, #b3e5fc, #e1f5fe); }
        .color-9 { background: linear-gradient(45deg, #e8eaf6, #c5cae9); }
        .color-10 { background: linear-gradient(45deg, #f3e5f5, #e1bee7); }
        
        .symbol-plus { background-color: #4ecdc4; color: white; }
        .symbol-minus { background-color: #ff6b6b; color: white; }
        .symbol-multiply { background-color: #ffd166; color: white; }
        .symbol-divide { background-color: #6a0572; color: white; }
        
        .btn-active {
            transform: scale(1.15);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        /* 微信浏览器特殊样式 */
        input, textarea, select, button {
            font-family: inherit;
            font-size: 16px; /* 防止iOS微信缩放 */
        }
        
        @media screen and (max-width: 480px) {
            .container {
                padding: 12px 10px;
            }
            
            h1 {
                font-size: 1.6em;
            }
            
            .subtitle {
                font-size: 0.85em;
            }
            
            .number-btn, .symbol-btn {
                max-width: 50px;
                max-height: 50px;
                font-size: 1.1em;
            }
            
            .symbol-btn {
                font-size: 1.6em;
            }
            
            .display-area {
                font-size: 1.1em;
                min-height: 70px;
                padding: 12px 8px;
            }
            
            .counter-display {
                font-size: 2.2em;
            }
            
            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 1.2em;
            }
            
            .emoji-display {
                font-size: 2.5em;
                height: 45px;
            }
        }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body ontouchstart=""> <!-- 添加ontouchstart事件提高移动端响应速度 -->
    <div class="container">
        <h1>👸 小公主的数学乐园 👸</h1>
        <p class="subtitle">点击数字和符号，探索神奇的数学世界！</p>
        
        <div class="section">
            <h2 style="font-size: 1.2em; margin-bottom: 10px;">🔢 认识数字 1-10</h2>
            <div class="numbers-grid" id="numbersGrid">
                <!-- 数字按钮将通过JavaScript生成 -->
            </div>
        </div>
        
        <div class="display-area" id="displayArea">
            欢迎来到数学乐园！
        </div>
        
        <div class="emoji-display" id="emojiDisplay">
            🌸
        </div>
        
        <div class="section">
            <h2 style="font-size: 1.2em; margin-bottom: 10px;">🧮 认识运算符号</h2>
            <div class="symbols-grid">
                <button class="symbol-btn symbol-plus" onclick="showSymbol('+')">+</button>
                <button class="symbol-btn symbol-minus" onclick="showSymbol('-')">−</button>
                <button class="symbol-btn symbol-multiply" onclick="showSymbol('×')">×</button>
                <button class="symbol-btn symbol-divide" onclick="showSymbol('÷')">÷</button>
            </div>
        </div>
        
        <div class="section">
            <h2 style="font-size: 1.2em; margin-bottom: 10px;">🎮 互动计数器</h2>
            <div class="interactive-area">
                <div class="counter-display" id="counterDisplay">0</div>
                <div class="controls">
                    <button class="control-btn add-btn" onclick="changeNumber(1)">+</button>
                    <button class="control-btn subtract-btn" onclick="changeNumber(-1)">-</button>
                </div>
            </div>
            <p style="font-size: 0.85em; margin-top: 8px;">点击 + 增加数字，点击 - 减少数字</p>
        </div>
    </div>

    <script>
        // 防止页面被缩放
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        });

        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            var now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 数字按钮颜色数组
        const colors = [
            'color-1', 'color-2', 'color-3', 'color-4', 'color-5',
            'color-6', 'color-7', 'color-8', 'color-9', 'color-10'
        ];
        
        // 初始化数字按钮
        function initNumbers() {
            const numbersGrid = document.getElementById('numbersGrid');
            for (let i = 1; i <= 10; i++) {
                const button = document.createElement('button');
                button.className = `number-btn ${colors[i-1]}`;
                button.textContent = i;
                button.onclick = () => showNumber(i);
                // 添加触摸事件支持
                button.ontouchstart = function(e) {
                    this.classList.add('btn-active');
                };
                button.ontouchend = function(e) {
                    setTimeout(() => {
                        this.classList.remove('btn-active');
                    }, 200);
                };
                numbersGrid.appendChild(button);
            }
        }
        
        // 显示数字信息
        function showNumber(num) {
            const displayArea = document.getElementById('displayArea');
            const emojiDisplay = document.getElementById('emojiDisplay');
            
            // 不同数字对应不同表情
            const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯'];
            const descriptions = [
                '一只可爱的小狗 🐶',
                '一只萌萌的小猫 🐱', 
                '一只机灵的小老鼠 🐭',
                '一只圆滚滚的仓鼠 🐹',
                '一只活泼的小兔子 🐰',
                '一只聪明的小狐狸 🦊',
                '一只憨厚的大熊 🐻',
                '一只黑白相间的大熊猫 🐼',
                '一只呆萌的考拉 🐨',
                '一只威武的小老虎 🐯'
            ];
            
            displayArea.innerHTML = `数字 ${num}<br>像${descriptions[num-1]}<br>读作：${getChineseNumber(num)}`;
            emojiDisplay.textContent = emojis[num-1];
            
            // 添加动画效果
            const btn = event.currentTarget || event.srcElement;
            btn.classList.add('btn-active');
            setTimeout(() => {
                btn.classList.remove('btn-active');
            }, 300);
        }
        
        // 获取中文数字
        function getChineseNumber(num) {
            const chineseNumbers = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            return chineseNumbers[num];
        }
        
        // 显示符号信息
        function showSymbol(symbol) {
            const displayArea = document.getElementById('displayArea');
            const emojiDisplay = document.getElementById('emojiDisplay');
            
            let description = '';
            let emoji = '';
            
            switch(symbol) {
                case '+':
                    description = '加号：用来把数字合在一起，像把糖果放一起数总数';
                    emoji = '🍬 + 🍬';
                    break;
                case '-':
                    description = '减号：用来拿走一些，像吃掉几颗糖果剩的';
                    emoji = '🍬 - 🍬';
                    break;
                case '×':
                    description = '乘号：用来重复，像有几组相同的玩具';
                    emoji = '🧸 × 2';
                    break;
                case '÷':
                    description = '除号：用来平分，像把蛋糕分给朋友';
                    emoji = '🍰 ÷ 2';
                    break;
            }
            
            displayArea.innerHTML = `${symbol} 符号<br>${description}`;
            emojiDisplay.textContent = emoji;
            
            // 添加动画效果
            const btn = event.currentTarget || event.srcElement;
            btn.classList.add('btn-active');
            setTimeout(() => {
                btn.classList.remove('btn-active');
            }, 300);
        }
        
        // 互动计数器
        let counterValue = 0;
        const counterDisplay = document.getElementById('counterDisplay');
        
        function changeNumber(change) {
            counterValue += change;
            if (counterValue < 0) counterValue = 0; // 防止负数
            counterDisplay.textContent = counterValue;
            
            // 更新表情
            updateCounterEmoji();
        }
        
        function updateCounterEmoji() {
            const emojiDisplay = document.getElementById('emojiDisplay');
            if (counterValue === 0) {
                emojiDisplay.textContent = '🌸';
            } else if (counterValue <= 5) {
                emojiDisplay.textContent = '🌟'.repeat(counterValue);
            } else {
                emojiDisplay.textContent = '🎉'.repeat(Math.min(counterValue, 10));
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initNumbers();
            
            // 为所有按钮添加触摸反馈
            const allButtons = document.querySelectorAll('button');
            allButtons.forEach(button => {
                if (!button.hasAttribute('ontouchstart')) {
                    button.ontouchstart = function() {
                        this.classList.add('btn-active');
                    };
                    button.ontouchend = function() {
                        setTimeout(() => {
                            this.classList.remove('btn-active');
                        }, 200);
                    };
                }
            });
        });
    </script>
</body>
</html>
