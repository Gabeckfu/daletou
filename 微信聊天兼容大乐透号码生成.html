<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大乐透号码生成</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f0f2f5;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #e62429;
            margin-bottom: 3px;
        }
        .subtitle {
            font-size: 13px;
            color: #666;
        }
        .numbers-display {
            text-align: center;
            margin: 15px 0;
        }
        .section-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .number-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .number-item {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 13px;
            color: white;
        }
        .red-number {
            background: #e62429;
        }
        .blue-number {
            background: #2575fc;
        }
        .generate-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #e62429;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0;
        }
        .history {
            margin-top: 15px;
        }
        .history-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .history-item {
            background: #f8f9fa;
            padding: 8px;
            margin: 6px 0;
            border-radius: 5px;
            font-size: 12px;
            border-left: 2px solid #2575fc;
        }
        .disclaimer {
            margin-top: 15px;
            padding: 10px;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 5px;
            font-size: 11px;
            color: #856404;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">超级大乐透号码</div>
            <div class="subtitle">随机生成器</div>
        </div>
        
        <div class="numbers-display">
            <div class="section-title">前区号码 (5个)</div>
            <div class="number-row" id="frontNumbers"></div>
            
            <div class="section-title">后区号码 (2个)</div>
            <div class="number-row" id="backNumbers"></div>
        </div>
        
        <button class="generate-btn" onclick="generateNumbers()">生成号码</button>
        
        <div class="history">
            <div class="history-title">历史记录</div>
            <div id="historyList"></div>
        </div>
        
        <div class="disclaimer">
            温馨提示：<br>1. 前区1-35选5个，后区1-12选2个<br>2. 仅供娱乐参考，理性购彩<br>3. 未成年人禁止购买
        </div>
    </div>

    <script>
        let history = [];

        function getRandomNumbers(count, min, max) {
            const nums = new Set();
            while(nums.size < count) {
                const num = Math.floor(Math.random() * (max - min + 1)) + min;
                nums.add(num);
            }
            return Array.from(nums).sort((a,b) => a - b);
        }

        function generateNumbers() {
            const front = getRandomNumbers(5, 1, 35);
            const back = getRandomNumbers(2, 1, 12);
            
            displayNumbers(front, back);
            addToHistory(front, back);
        }

        function displayNumbers(front, back) {
            const frontEl = document.getElementById('frontNumbers');
            const backEl = document.getElementById('backNumbers');
            
            frontEl.innerHTML = '';
            backEl.innerHTML = '';
            
            front.forEach(num => {
                const span = document.createElement('span');
                span.className = 'number-item red-number';
                span.textContent = String(num).padStart(2, '0');
                frontEl.appendChild(span);
            });
            
            back.forEach(num => {
                const span = document.createElement('span');
                span.className = 'number-item blue-number';
                span.textContent = String(num).padStart(2, '0');
                backEl.appendChild(span);
            });
        }

        function addToHistory(front, back) {
            const record = {
                front: [...front],
                back: [...back],
                time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})
            };
            
            history.unshift(record);
            if(history.length > 5) history.pop();
            updateHistory();
        }

        function updateHistory() {
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = '';
            
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `${item.time} | 前区:${item.front.map(n => String(n).padStart(2, '0')).join(' ')} 后区:${item.back.map(n => String(n).padStart(2, '0')).join(' ')}`;
                listEl.appendChild(div);
            });
        }

        generateNumbers();
    </script>
</body>
</html>
